name: CI
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  changes:
    name: "changes / detect"
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      e2e: ${{ steps.filter.outputs.e2e }}
      infra: ${{ steps.filter.outputs.infra }}
      packages: ${{ steps.filter.outputs.packages }}
      package_tests: ${{ steps.filter.outputs.package_tests }}
      repo: ${{ steps.filter.outputs.repo }}
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - ".github/workflows/**"
            e2e:
              - "apps/web/**"
              - "packages/design/**"
              - "packages/orpc/**"
            infra:
              - ".tflint.hcl"
              - "terraform/**"
            packages:
              - "packages/**"
            package_tests:
              - "packages/bottle-classifier/**"
              - "packages/catalog-verifier/**"
              - "packages/entity-classifier/**"
            repo:
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "turbo.json"
            server:
              - "apps/server/**"
              - "apps/cli/**"
              - "docker-compose.yml"
              - "packages/bottle-classifier/**"
              - "packages/catalog-verifier/**"
              - "packages/design/**"
              - "packages/email/**"
              - "packages/entity-classifier/**"
              - "packages/orpc/**"
              - "packages/tsconfig/**"
            web:
              - "apps/web/**"
              - "apps/server/**"
              - "packages/bottle-classifier/**"
              - "packages/design/**"
              - "packages/orpc/**"
              - "packages/tsconfig/**"

  tflint:
    name: "infra / terraform lint"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        name: Cache plugin dir
        with:
          path: ~/.tflint.d/plugins
          key: ${{ runner.os }}-tflint-${{ hashFiles('.tflint.hcl') }}
      - uses: terraform-linters/setup-tflint@v3
        name: Setup TFLint
        with:
          tflint_version: v0.50.0
      - name: Show version
        run: tflint --version
      - name: Init TFLint
        run: tflint --init
        env:
          # https://github.com/terraform-linters/tflint/blob/master/docs/user-guide/plugins.md#avoiding-rate-limiting
          GITHUB_TOKEN: ${{ github.token }}
      - name: Run TFLint
        run: tflint -f compact
  package-build:
    name: "build / packages"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.repo == 'true' || needs.changes.outputs.server == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build:packages

  server-build:
    name: "build / server"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.repo == 'true' || needs.changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build server
        run: pnpm build:server

  web-build:
    name: "build / web"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.repo == 'true' || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm build:web

  server-tests:
    name: "test / server (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.repo == 'true' || needs.changes.outputs.server == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Run docker images
        run: docker compose up -d
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run server tests
        run: pnpm --filter @peated/server test:ci -- --shard=${{ matrix.shard }}/${{ matrix.total }}

  package-tests:
    name: "test / packages"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.package_tests == 'true' || needs.changes.outputs.repo == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run package tests
        run: pnpm -r --filter='./packages/*' run --if-present test

  web-unit-tests:
    name: "test / web unit"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.repo == 'true' || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run web unit tests
        run: pnpm --filter @peated/web test:ci

  test:
    name: "ci / required"
    runs-on: ubuntu-latest
    needs:
      - changes
      - tflint
      - package-build
      - server-build
      - web-build
      - package-tests
      - server-tests
      - web-unit-tests
      - e2e
    if: always()
    steps:
      - name: Check test jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            exit 1
          fi
          failed=0
          for result in \
            "${{ needs.tflint.result }}" \
            "${{ needs['package-build'].result }}" \
            "${{ needs['server-build'].result }}" \
            "${{ needs['web-build'].result }}" \
            "${{ needs['package-tests'].result }}" \
            "${{ needs['server-tests'].result }}" \
            "${{ needs['web-unit-tests'].result }}" \
            "${{ needs.e2e.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              failed=1
            fi
          done
          exit "$failed"
  e2e:
    name: "test / web e2e"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.repo == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - uses: actions/cache@v4
        name: Setup Playwright cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright system dependencies
        run: pnpm --dir apps/web exec playwright install-deps chromium
      - name: Install Playwright browser
        run: pnpm --dir apps/web exec playwright install chromium
      - name: Run e2e tests
        run: pnpm test:e2e
